<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>יואב – ניהול בדיקות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef1f8;
  --surface:#fff;
  --surface2:#f7f9ff;
  --border:rgba(0,0,0,.06);
  --border2:rgba(0,0,0,.12);
  --text:#0b1221;
  --muted:#5a6a85;
  --light:#96a6be;
  --navy:#0c2340;
  --navy2:#1a3a6a;
  --accent:#2563eb;
  --accent-light:#eff6ff;
  --accent-dark:#1d4ed8;
  --green:#059669;
  --green-light:#ecfdf5;
  --purple:#7c3aed;
  --amber:#d97706;
  --red:#dc2626;
  --r:16px;--rsm:10px;--rxs:7px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 4px 24px rgba(0,0,0,.10);
  --sh3:0 12px 48px rgba(0,0,0,.16);
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.55;-webkit-tap-highlight-color:transparent;overflow-x:hidden}

/* LOADER */
#loader{position:fixed;inset:0;background:#0c2340;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
#loader.out{opacity:0;pointer-events:none}
.ld-ring{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.1);border-top-color:#60a5fa;animation:spin .8s linear infinite;margin-bottom:24px}
.ld-name{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:6px}
.ld-desc{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
header{
  background:var(--navy);
  padding:0 2rem;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:0 1px 0 rgba(255,255,255,.06),0 4px 20px rgba(0,0,0,.3);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-info .logo-name{font-size:18px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1.1}
.logo-info .logo-sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
.hdr-end{display:flex;align-items:center;gap:10px}
.status-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:6px 13px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.5)}
.sdot{width:7px;height:7px;border-radius:50%;background:#4b5563;flex-shrink:0;transition:background .3s}
.sdot.ok{background:#22c55e;box-shadow:0 0 8px rgba(34,197,94,.6)}
.sdot.err{background:#ef4444}
.sdot.loading{background:#f59e0b;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* BUTTONS */
button{cursor:pointer;border:none;border-radius:var(--rsm);padding:10px 18px;font-size:13px;font-family:'Heebo',sans-serif;font-weight:600;transition:all .18s;line-height:1;user-select:none;-webkit-tap-highlight-color:transparent}
button:active{transform:scale(.96)}
.btn-hdr{background:rgba(255,255,255,.09);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.12);font-size:12px;padding:8px 14px}
.btn-hdr:hover{background:rgba(255,255,255,.16);color:#fff}
.btn-new{background:var(--accent);color:#fff;padding:9px 18px;font-size:13px;box-shadow:0 2px 10px rgba(37,99,235,.4)}
.btn-new:hover{background:var(--accent-dark);box-shadow:0 4px 16px rgba(37,99,235,.5)}
.btn-cancel{background:var(--surface);color:var(--muted);border:1.5px solid var(--border2)}
.btn-cancel:hover{border-color:var(--muted);color:var(--text)}
.btn-save{background:var(--green);color:#fff;padding:12px 24px;font-size:14px;box-shadow:0 2px 10px rgba(5,150,105,.35)}
.btn-save:hover{background:#047857;box-shadow:0 4px 16px rgba(5,150,105,.45)}

/* MAIN */
.wrap{padding:1.75rem 2rem;max-width:1500px;margin:0 auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:2rem}
.sc{
  background:var(--surface);border-radius:var(--r);
  padding:1.25rem 1.4rem;box-shadow:var(--sh);
  border:1px solid var(--border);
  display:flex;align-items:center;gap:16px;
  transition:box-shadow .2s,transform .2s;
  position:relative;overflow:hidden;
}
.sc:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.sc-icon{
  width:48px;height:48px;border-radius:13px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.sc:nth-child(1) .sc-icon{background:#eff6ff}
.sc:nth-child(2) .sc-icon{background:#f5f3ff}
.sc:nth-child(3) .sc-icon{background:#ecfdf5}
.sc:nth-child(4) .sc-icon{background:#fffbeb}
.sc-info .sc-val{font-size:32px;font-weight:900;line-height:1;letter-spacing:-1.5px;color:var(--text)}
.sc-info .sc-lbl{font-size:12px;color:var(--muted);font-weight:500;margin-top:3px}
.sc::after{content:'';position:absolute;bottom:0;right:0;left:0;height:3px;border-radius:0 0 var(--r) var(--r)}
.sc:nth-child(1)::after{background:var(--accent)}
.sc:nth-child(2)::after{background:var(--purple)}
.sc:nth-child(3)::after{background:var(--green)}
.sc:nth-child(4)::after{background:var(--amber)}

/* TABS */
.tabs-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
.tabs{display:flex;background:var(--surface);border-radius:var(--r);padding:5px;box-shadow:var(--sh);border:1px solid var(--border);gap:4px}
.tab{padding:9px 24px;font-size:13px;font-weight:700;border:none;background:none;color:var(--muted);border-radius:var(--rsm);transition:all .2s}
.tab.on{background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(12,35,64,.25)}
.tab:hover:not(.on){background:var(--bg);color:var(--text)}
.tc{display:none}.tc.on{display:block}

/* GANTT LAYOUT */
.gl{display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start}

/* MINI CAL */
.mcal{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;user-select:none}
.mcal-hdr{background:var(--navy);padding:15px 16px;display:flex;align-items:center;justify-content:space-between}
.mcal-title{color:#fff;font-size:14px;font-weight:700}
.mcal-nav{background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:17px;padding:0;cursor:pointer;transition:background .15s}
.mcal-nav:hover{background:rgba(255,255,255,.22)}
.mcal-body{padding:12px 11px}
.mcal-dn{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px}
.mcal-dname{text-align:center;font-size:10px;font-weight:700;color:var(--light);padding:3px 0}
.mcal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;border-radius:8px;cursor:pointer;
  color:var(--text);transition:all .12s;position:relative;
}
.cd:hover{background:var(--accent-light);color:var(--accent)}
.cd.dim{color:var(--light);font-weight:400}
.cd.tod{background:var(--accent-light);color:var(--accent);font-weight:800}
.cd.sel{background:var(--navy);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(12,35,64,.3)}
.cd.ev::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cd.sel::after{background:rgba(255,255,255,.7)}
.cd.wk{color:#e11d48}
.cd.sel.wk{color:#fda4af}
.mcal-foot{padding:10px 12px;border-top:1px solid var(--border)}
.today-btn{width:100%;background:var(--bg);border:1.5px solid var(--border2);color:var(--text);border-radius:var(--rsm);padding:8px;font-size:12px;font-weight:700;transition:all .18s}
.today-btn:hover{background:var(--navy);color:#fff;border-color:transparent}

/* GANTT CARD */
.gc{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.gc-top{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface2);flex-wrap:wrap;gap:10px;
}
.gc-title{font-size:17px;font-weight:800;color:var(--navy);letter-spacing:-.4px}
.gc-nav{display:flex;align-items:center;gap:6px}
.gc-nav button{
  background:var(--bg);border:1.5px solid var(--border2);color:var(--text);
  height:34px;padding:0 14px;width:auto;white-space:nowrap;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;border-radius:var(--rsm);
}
.gc-nav button:hover{border-color:var(--accent);color:var(--accent)}
.gc-filters{display:flex;gap:8px;flex-wrap:wrap}
.gc-filters select{
  border:1.5px solid var(--border2);border-radius:var(--rsm);
  padding:8px 12px;font-size:12px;font-family:'Heebo',sans-serif;
  background:#fff;color:var(--text);font-weight:600;cursor:pointer;
  transition:border-color .15s;
}
.gc-filters select:focus{outline:none;border-color:var(--accent)}
.gscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gtable{width:100%;border-collapse:collapse}
.dhead{
  min-width:60px;width:60px;text-align:center;
  font-size:11px;color:var(--muted);
  border-left:1px solid var(--border);
  padding:10px 2px;background:var(--surface2);
  position:sticky;top:0;
}
.dhead.todh{background:var(--accent-light)}
.dhead.wkh{background:#fafafa;color:var(--light)}
.dnum{font-size:16px;font-weight:800;display:block;margin-bottom:1px;color:var(--text)}
.dhead.todh .dnum{color:var(--accent)}
.dday{font-size:9px;font-weight:700;text-transform:uppercase;opacity:.6}
.gcell{
  min-width:60px;width:60px;height:120px;
  border-left:1px solid var(--border);border-bottom:1px solid var(--border);
  vertical-align:top;padding:4px 3px;
  cursor:pointer;transition:background .12s;position:relative;
}
.gcell:hover{background:#eef4ff}
.gcell.todc{background:rgba(37,99,235,.04);border-left-color:rgba(37,99,235,.25)}
.gcell.wkc{background:#fafafa}

/* EVENT CARD */
.evc{
  border-radius:8px;padding:5px 7px;margin-bottom:3px;
  font-size:10px;line-height:1.4;cursor:pointer;
  color:#fff;overflow:hidden;position:relative;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.evc:hover{transform:scale(1.04);box-shadow:0 3px 12px rgba(0,0,0,.25);z-index:2}
.evc-bld{font-weight:800;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evc-crew{opacity:.88;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* LEGEND */
.gleg{display:flex;gap:20px;padding:13px 20px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center;background:var(--surface2)}
.litem{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:600}
.ldot{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.ltip{margin-right:auto;font-size:11px;color:var(--light);font-style:italic}

/* LIST */
.lcard{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.ltable{width:100%;border-collapse:collapse}
.ltable th{
  text-align:right;padding:13px 18px;
  font-size:10px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.7px;
  border-bottom:1px solid var(--border);background:var(--surface2);
}
.ltable td{padding:12px 18px;font-size:13px;border-bottom:1px solid var(--border);transition:background .1s}
.ltable tr:last-child td{border-bottom:none}
.ltable tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:#fff}
.inv-btn{font-size:11px;color:var(--accent);background:var(--accent-light);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-weight:700;transition:all .15s;white-space:nowrap}
.inv-btn:hover{background:var(--accent);color:#fff}

/* MODAL */
.moverlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:400;
  align-items:center;justify-content:center;
  backdrop-filter:blur(6px);padding:1rem;
}
.moverlay.on{display:flex}
.mbox{
  background:var(--surface);border-radius:var(--r);
  padding:2rem;width:100%;max-width:500px;
  box-shadow:var(--sh3);
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
@keyframes popIn{from{transform:scale(.94) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.mhdr h2{font-size:19px;font-weight:800;color:var(--navy)}
.mclose{background:var(--bg);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--muted);cursor:pointer;transition:all .15s}
.mclose:hover{background:#fee2e2;color:var(--red)}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{
  width:100%;border:1.5px solid var(--border2);border-radius:var(--rsm);
  padding:11px 13px;font-size:14px;font-family:'Heebo',sans-serif;
  background:var(--surface);color:var(--text);
  transition:border-color .15s,box-shadow .15s;-webkit-appearance:none;
}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfooter{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* STAFF PICKER */
.spicker{border:1.5px solid var(--border2);border-radius:var(--rsm);overflow:hidden}
.ssearch-wrap{padding:10px;border-bottom:1px solid var(--border);background:var(--surface2)}
.ssearch{
  width:100%;border:1.5px solid var(--border2);border-radius:var(--rxs);
  padding:9px 12px;font-size:13px;font-family:'Heebo',sans-serif;background:#fff;
  transition:border-color .15s;
}
.ssearch:focus{outline:none;border-color:var(--accent)}
.slist{max-height:180px;overflow-y:auto}
.sopt{
  padding:11px 14px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .1s;border-bottom:1px solid var(--border);
}
.sopt:last-child{border-bottom:none}
.sopt:hover{background:var(--accent-light)}
.sname{font-size:13px;font-weight:700;color:var(--text)}
.semail{font-size:11px;color:var(--muted);direction:ltr;margin-top:2px}
.sadd{
  width:28px;height:28px;border-radius:50%;
  background:var(--accent-light);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:400;flex-shrink:0;
  transition:all .15s;line-height:1;
}
.sopt:hover .sadd{background:var(--accent);color:#fff}
.stags{display:flex;flex-wrap:wrap;gap:7px;min-height:38px;padding:4px 0;align-items:center}
.stag{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--accent-light);color:var(--accent-dark);
  border:1.5px solid #bfdbfe;border-radius:20px;
  padding:5px 13px;font-size:12px;font-weight:700;
}
.stag .rm{cursor:pointer;font-size:17px;line-height:1;color:#93c5fd;font-weight:700;transition:color .1s}
.stag .rm:hover{color:var(--red)}
.nostaf{color:var(--light);font-size:13px;padding:6px 2px;font-style:italic}

/* DETAIL POPUP – overlay */
.dpop-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.5);
  align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.dpop-overlay.on{display:flex}
.dpop{
  background:var(--surface);
  border-radius:20px 20px 0 0;
  width:100%;max-width:520px;
  max-height:85vh;
  display:flex;flex-direction:column;
  box-shadow:var(--sh3);
  animation:slideUp .22s ease;
}
@media(min-width:769px){
  .dpop-overlay{align-items:center;padding:1rem}
  .dpop{border-radius:var(--r);max-width:440px;animation:popIn .2s ease}
}
.dpop-hdr{flex-shrink:0;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;padding:16px 18px;
  border-radius:20px 20px 0 0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
@media(min-width:769px){.dpop-hdr{border-radius:var(--r) var(--r) 0 0}}
.dpop-badge{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;
  background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);
  white-space:nowrap;
}
.dpop-title{font-size:14px;font-weight:800;flex:1}
.dpop-close{
  background:rgba(255,255,255,.12);border:none;border-radius:7px;
  color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.dpop-close:hover{background:rgba(255,255,255,.22);color:#fff}
.dpop-body{padding:16px 18px;overflow-y:auto;flex:1}
.drow{
  display:flex;align-items:center;gap:12px;
  padding:9px 12px;border-radius:9px;margin-bottom:6px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:13px;
}
.drow:last-child{margin-bottom:0}
.dico{font-size:17px;flex-shrink:0}
.dval{color:var(--text);line-height:1.4;flex:1}
.dval small{display:block;font-size:10px;color:var(--muted);margin-top:1px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.dcrew-section{margin-top:10px}
.dcrew-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;padding-right:2px}
.dcrew{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border-radius:9px;
  padding:9px 12px;margin-bottom:6px;
  border:1px solid var(--border);
  transition:background .1s;
}
.dcrew:last-child{margin-bottom:0}
.dcrew:hover{background:var(--accent-light)}
.dcrew-av{
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;flex-shrink:0;
}
.dcrew-info{flex:1}
.dcrew-name{font-weight:700;font-size:13px;color:var(--text)}
.dcrew-email{font-size:11px;color:var(--muted);direction:ltr;margin-top:1px}
.dpop-foot{padding:12px 18px;border-top:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.dpop-inv-btn{
  width:100%;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rsm);padding:10px;
  font-size:13px;font-weight:700;cursor:pointer;
  font-family:'Heebo',sans-serif;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.dpop-inv-btn:hover{background:var(--accent-dark)}
.btn-spinner{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  animation:spin .7s linear infinite;
  flex-shrink:0;display:none;
}
.btn-spinning .btn-spinner{display:block}
.btn-spinning{opacity:.85;cursor:not-allowed;pointer-events:none}
.dpop-edit-btn{
  background:var(--surface2);color:var(--navy);
  border:1.5px solid var(--border2);border-radius:var(--rsm);
  padding:8px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Heebo',sans-serif;transition:all .15s;
}
.dpop-edit-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.dpop-del-btn{
  background:#fff1f2;color:#be123c;
  border:1.5px solid #fecdd3;border-radius:var(--rsm);
  padding:8px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:'Heebo',sans-serif;transition:all .15s;
}
.dpop-del-btn:hover{background:#ffe4e6;border-color:#fda4af}

/* PERIOD POPUP */
.ppop-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.45);z-index:450;
  align-items:flex-start;justify-content:center;
  backdrop-filter:blur(4px);padding:4rem 1rem 1rem;
}
.ppop-overlay.on{display:flex}
.ppop{
  background:var(--surface);border-radius:var(--r);
  box-shadow:var(--sh3);width:100%;max-width:600px;
  max-height:80vh;display:flex;flex-direction:column;
  animation:popIn .22s ease;overflow:hidden;
}
.ppop-hdr{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  padding:18px 22px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.ppop-hdr-left{display:flex;flex-direction:column;gap:3px}
.ppop-title{font-size:17px;font-weight:800;color:#fff}
.ppop-sub{font-size:12px;color:rgba(255,255,255,.5)}
.ppop-close{
  background:rgba(255,255,255,.12);border:none;border-radius:8px;
  color:#fff;font-size:18px;cursor:pointer;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.ppop-close:hover{background:rgba(255,255,255,.22)}
.ppop-tabs{
  display:flex;padding:12px 16px 0;gap:4px;
  border-bottom:1px solid var(--border);background:var(--surface2);
  flex-shrink:0;
}
.ppop-tab{
  padding:8px 18px;font-size:13px;font-weight:700;
  border:none;background:none;color:var(--muted);
  border-radius:var(--rsm) var(--rsm) 0 0;cursor:pointer;
  transition:all .15s;border-bottom:2.5px solid transparent;
  font-family:'Heebo',sans-serif;
}
.ppop-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface)}
.ppop-tab:hover:not(.on){background:var(--bg)}
.ppop-body{flex:1;overflow-y:auto;padding:16px}
.ppop-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.ppop-empty .pe-icon{font-size:40px;margin-bottom:12px}
.ppop-empty .pe-txt{font-size:14px;font-weight:500}
.ppop-empty .pe-sub{font-size:12px;color:var(--light);margin-top:4px}
.pcheck-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rsm);padding:14px 16px;margin-bottom:10px;
  border-right:4px solid var(--accent);
  transition:box-shadow .15s;cursor:default;
}
.pcheck-card:hover{box-shadow:var(--sh2)}
.pcheck-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.pcheck-date{font-size:12px;font-weight:700;color:var(--muted)}
.pcheck-bld{font-size:15px;font-weight:800;color:var(--navy)}
.pcheck-floor{font-size:12px;color:var(--muted);background:var(--bg);padding:2px 9px;border-radius:20px;font-weight:600}
.pcheck-domain{font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:20px}
.pcheck-crew{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
.pcheck-crew-tag{
  display:flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 11px;font-size:12px;
}
.pct-av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.pct-name{font-weight:600;color:var(--text)}

@media(max-width:768px){
  .ppop-overlay{padding:2rem 0 0;align-items:flex-end}
  .ppop{max-width:100%;border-radius:20px 20px 0 0;max-height:85vh}
  .dpop{min-width:88vw;max-width:94vw;left:50%!important;transform:translateX(-50%)!important;top:auto!important;bottom:85px}
}

/* FAB */
.fab{
  display:none;position:fixed;bottom:22px;left:22px;
  width:60px;height:60px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:28px;
  align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(37,99,235,.5);
  z-index:100;border:none;cursor:pointer;
  transition:transform .18s,box-shadow .18s;
}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,99,235,.6)}
.fab:active{transform:scale(.93)}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:600;
  background:var(--navy);color:#fff;
  padding:14px 20px;border-radius:var(--rsm);
  font-size:14px;font-weight:600;
  box-shadow:var(--sh3);
  transform:translateY(80px);opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-right:4px solid var(--green)}
.toast.warn{border-right:4px solid var(--amber)}
.toast.err{border-right:4px solid var(--red)}

/* CREDIT FOOTER */
.credit-footer{
  text-align:center;padding:2rem 1rem 1.5rem;margin-top:.5rem;
}
.credit-inner{
  display:inline-flex;align-items:center;gap:12px;
  background:var(--surface);border-radius:40px;
  padding:10px 22px;
  border:1px solid var(--border2);
  box-shadow:var(--sh);
}
.credit-text{
  font-size:13px;font-weight:500;
  color:var(--muted);
  display:flex;align-items:center;gap:6px;
}
.credit-name{
  font-weight:800;font-size:14px;
  background:linear-gradient(135deg,#4285f4,#9b59b6,#ea4335,#fbbc05,#34a853,#4285f4);
  background-size:300% 300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:geminiShift 4s ease infinite;
}
@keyframes geminiShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.credit-gems{display:flex;gap:4px;align-items:center}
.gem{
  font-size:12px;
  animation:gemPulse 2.4s ease-in-out infinite;
}
.g1{color:#4285f4;animation-delay:0s}
.g2{color:#9b59b6;animation-delay:.3s}
.g3{color:#ea4335;animation-delay:.6s}
@keyframes gemPulse{
  0%,100%{opacity:.4;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.1)}
}

/* LOGO MARK */
.logo-mark{
  width:38px;height:38px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
  box-shadow:0 2px 8px rgba(37,99,235,.5);
}

/* WEEK CALENDAR */
.week-cal{padding:12px;overflow-x:auto}
.week-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:10px;min-width:600px;
}
.week-day{
  background:var(--surface2);border-radius:var(--rsm);
  border:1.5px solid var(--border);overflow:hidden;
  transition:box-shadow .15s;min-height:140px;
}
.week-day:hover{box-shadow:var(--sh2)}
.week-day.today{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.week-day.weekend{background:#fafafa}
.wd-hdr{
  padding:10px 10px 8px;border-bottom:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.wd-name{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.wd-num{
  font-size:22px;font-weight:900;color:var(--text);line-height:1;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;
}
.week-day.today .wd-num{background:var(--accent);color:#fff}
.week-day.weekend .wd-num{color:#e11d48}
.wd-body{padding:7px 6px;display:flex;flex-direction:column;gap:4px;cursor:pointer}
.wd-body:hover{background:rgba(37,99,235,.02)}
.wd-ev{
  border-radius:6px;padding:5px 8px;font-size:10.5px;
  font-weight:600;color:#fff;line-height:1.35;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
  box-shadow:0 1px 3px rgba(0,0,0,.18);
}
.wd-ev:hover{transform:scale(1.03);box-shadow:0 2px 8px rgba(0,0,0,.22)}
.wd-ev-bld{font-weight:800;font-size:11px}
.wd-ev-crew{opacity:.85;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wd-add{
  border:1.5px dashed var(--border2);border-radius:6px;
  padding:6px;text-align:center;font-size:11px;color:var(--light);
  cursor:pointer;transition:all .15s;margin-top:2px;
}
.wd-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.week-empty{text-align:center;padding:2rem;color:var(--light);font-size:13px}

@media(max-width:768px){
  .week-grid{grid-template-columns:repeat(7,minmax(100px,1fr))}
}

/* MOBILE WEEK NAV */
.mobile-week-nav{
  display:none;
  align-items:center;justify-content:space-between;
  padding:10px 12px;border-top:1px solid var(--border);
  background:var(--surface2);gap:8px;
}
.mwn-btn{
  background:var(--navy);color:#fff;border:none;
  border-radius:var(--rsm);padding:10px 14px;
  font-size:13px;font-weight:700;
  font-family:'Heebo',sans-serif;
  white-space:nowrap;flex-shrink:0;
  box-shadow:0 2px 8px rgba(12,35,64,.3);
}
.mwn-btn:hover{background:var(--navy2)}
.mwn-center{position:relative;flex:1;display:flex;justify-content:center}
.mwn-date{
  position:absolute;inset:0;opacity:0;cursor:pointer;
  width:100%;height:100%;z-index:2;
}
.mwn-date-label{
  background:var(--surface);border:1.5px solid var(--border2);
  border-radius:var(--rsm);padding:9px 16px;
  font-size:13px;font-weight:700;color:var(--navy);
  cursor:pointer;white-space:nowrap;
  box-shadow:var(--sh);
  display:flex;align-items:center;gap:6px;
}

@media(max-width:768px){
  .mobile-week-nav{display:flex}
  .gc-nav{display:none}
}

/* PERIOD BUTTONS */
.btn-period{
  background:var(--surface);color:var(--navy);
  border:1.5px solid var(--border2);
  padding:9px 16px;font-size:13px;font-weight:700;
  border-radius:var(--rsm);font-family:'Heebo',sans-serif;
  transition:all .18s;box-shadow:var(--sh);
}
.btn-period:hover{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:var(--sh2)}
.btn-period:active{transform:scale(.96)}

/* MOBILE */
@media(max-width:768px){
  header{height:58px;padding:0 1.1rem}
  .logo-info .logo-sub{display:none}
  .hdr-end .status-chip{display:none}
  .wrap{padding:.85rem 1rem 5rem}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
  .sc{padding:1rem 1.1rem;gap:12px}
  .sc-icon{width:40px;height:40px;font-size:18px}
  .sc-info .sc-val{font-size:26px}
  .tabs-bar{flex-direction:column;align-items:stretch}
  .tabs{width:100%}.tab{flex:1;text-align:center;padding:10px 6px}
  .gl{grid-template-columns:1fr}
  .mcal{display:none}
  .gc-top{flex-direction:column;align-items:flex-start}
  .gc-nav{display:none}
  .gcell{min-width:48px;width:48px;height:100px}
  .dhead{min-width:48px;width:48px}
  .dnum{font-size:14px}
  .ltable th:nth-child(3),.ltable td:nth-child(3),
  .ltable th:nth-child(6),.ltable td:nth-child(6){display:none}
  .moverlay{align-items:flex-end;padding:0}
  .mbox{border-radius:20px 20px 0 0;max-height:90vh;padding:1.5rem 1.25rem 2rem;animation:slideUp .25s ease}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .frow{grid-template-columns:1fr}
  .mfooter{flex-direction:column-reverse}
  .mfooter button{width:100%;padding:14px}
  .dpop.on{display:flex;flex-direction:column}
  .fab{display:flex}
  .btn-hdr-new{display:none}
  .toast{bottom:80px;right:12px;left:12px;max-width:none}
}
@media(max-width:420px){
  .stats{gap:8px}
  .sc{padding:.85rem .95rem}
  .sc-info .sc-val{font-size:24px}
  .gc-filters select{font-size:11px;padding:7px 9px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-ring"></div>

</div>

<header>
  <div class="logo">
    <div class="logo-mark">
      <img src="logoyoav.png" alt="יואב" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" style="width:100%;height:100%;object-fit:cover;border-radius:10px"/>
      <span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-size:18px;font-weight:900;color:#fff">י</span>
    </div>
    <div class="logo-info">
      <div class="logo-name">יואב</div>
      <div class="logo-sub">ניהול בדיקות מבנים</div>
    </div>
  </div>
  <div class="hdr-end">
    <div class="status-chip"><div class="sdot" id="sdot"></div><span id="stxt">טוען...</span></div>

    <button class="btn-new btn-hdr-new" onclick="openModal()">＋ בדיקה חדשה</button>
  </div>
</header>

<div class="wrap">
  <div class="stats">
    <div class="sc"><div class="sc-icon">📋</div><div class="sc-info"><div class="sc-val" id="stTotal">–</div><div class="sc-lbl">סה"כ בדיקות</div></div></div>
    <div class="sc"><div class="sc-icon">📅</div><div class="sc-info"><div class="sc-val" id="stMonth">–</div><div class="sc-lbl">החודש הנוכחי</div></div></div>
    <div class="sc"><div class="sc-icon">🏢</div><div class="sc-info"><div class="sc-val" id="stBld">–</div><div class="sc-lbl">מבנים פעילים</div></div></div>
    <div class="sc"><div class="sc-icon">🔧</div><div class="sc-info"><div class="sc-val" id="stDom">–</div><div class="sc-lbl">תחומים</div></div></div>
  </div>

  <div class="tabs-bar">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('G',this)">📅 גאנט</button>
      <button class="tab" onclick="switchTab('L',this)">📋 רשימה</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-period" onclick="showPeriod('day')">📆 היום</button>

      <button class="btn-period" onclick="showPeriod('month')">📋 החודש</button>
    </div>
  </div>

  <div class="tc on" id="tcG">
    <div class="gl">
      <div>
        <div class="mcal">
          <div class="mcal-hdr">
            <button class="mcal-nav" onclick="prevM()">‹</button>
            <div class="mcal-title" id="calT"></div>
            <button class="mcal-nav" onclick="nextM()">›</button>
          </div>
          <div class="mcal-body">
            <div class="mcal-dn">
              <div class="mcal-dname">א</div><div class="mcal-dname">ב</div>
              <div class="mcal-dname">ג</div><div class="mcal-dname">ד</div>
              <div class="mcal-dname">ה</div><div class="mcal-dname">ו</div>
              <div class="mcal-dname">ש</div>
            </div>
            <div class="mcal-days" id="calDays"></div>
          </div>
          <div class="mcal-foot"><button class="today-btn" onclick="goToday()">⟳ חזרה להיום</button></div>
        </div>
      </div>
      <div class="gc">
        <div class="gc-top">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
            <div class="gc-title" id="gTitle"></div>
            <div class="gc-nav">
              <button onclick="prevW()">‹ שבוע קודם</button>
              <button onclick="goToday()" style="font-size:11px;padding:0 12px;width:auto">היום</button>
              <button onclick="nextW()">שבוע הבא ›</button>
            </div>
          </div>
          <div class="gc-filters">
            <select id="fBld" onchange="renderG()"><option value="">כל המבנים</option></select>
            <select id="fDom" onchange="renderG()"><option value="">כל התחומים</option></select>
          </div>
        </div>
        <div class="week-cal" id="weekCal"></div>

          <button class="mwn-btn" onclick="nextW()">שבוע הבא ›</button>
        </div>
        <div class="gleg" id="gleg"></div>
      </div>

  </div>

  <div class="tc" id="tcL">
    <div class="lcard">
      <table class="ltable">

        <tbody id="lbody"></tbody>
      </table>
    </div>
  </div>
</div>

<button class="fab" onclick="openModal()">＋</button>

<div class="moverlay" id="moverlay" onclick="if(event.target===this)closeModal()">
  <div class="mbox">
    <div class="mhdr">
      <h2>בדיקה חדשה</h2>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="frow">
      <div class="fg"><label>תאריך</label><input type="date" id="fDate"/></div>
      <div class="fg"><label>מבנה</label><select id="fBuild" onchange="onBuildingChange()"><option>10a</option><option>10b</option><option>10c</option></select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>קומה</label><select id="fFloor" onchange=""></select></div>
      <div class="fg"><label>תחום</label><select id="fDomain" onchange="onDomChange()"><option>מאיפנים</option><option>בדיקות</option><option>יועצים</option><option>אחר</option></select></div>
    </div>
    <div class="fg">

      <div id="selStaff" class="stags"><div class="nostaf">טרם נבחרו</div></div>

<div class="dpop-overlay" id="dpopOverlay" onclick="if(event.target===this)closeDpop()">

      </div>

    <div class="dpop-body" id="dpbody"></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <button class="dpop-edit-btn" id="dpeditbtn"><div class="btn-spinner"></div>✏️ ערוך בדיקה</button>
        <button class="dpop-del-btn" id="dpdelbtn"><div class="btn-spinner"></div>🗑️ מחק בדיקה</button>

</div>

<!-- PERIOD POPUP -->
<div class="ppop-overlay" id="ppopOverlay" onclick="if(event.target===this)closePpop()">
  <div class="ppop">
    <div class="ppop-hdr">
      <div class="ppop-hdr-left">
        <div class="ppop-title" id="ppopTitle">בדיקות היום</div>
        <div class="ppop-sub" id="ppopSub"></div>

      <button class="ppop-close" onclick="closePpop()">✕</button>

      <button class="ppop-tab on" onclick="switchPpopTab('day',this)">📆 היום</button>
      <button class="ppop-tab" onclick="switchPpopTab('week',this)">🗓️ השבוע</button>
      <button class="ppop-tab" onclick="switchPpopTab('month',this)">📋 החודש</button>
    </div>
    <div class="ppop-body" id="ppopBody"></div>
  </div>

// SYNC
async function syncData(){await sync();}
async function sync(){
  ss('loading','מסנכרן...');
  console.log('מתחיל סנכרון...');
  try{
    const r=await fetch(SCRIPT_URL+'?action=getAll');
    console.log('סטטוס:',r.status);
    const j=await r.json();
    console.log('בדיקות:',(j.checks||[]).length,'| נתונים:',(j.staff||[]).length);
    parseChecks(j.checks||[]);
    parseStaff(j.staff||[]);
    refresh();ss('ok','מחובר');
    toast('נתונים עודכנו ✓','ok');
  }catch(e){
    console.error('שגיאה:',e.message);

    toast('שגיאת חיבור לשיטס','err');
  }finally{hideLoad();}

function parseChecks(raw){
  checks=[];
  for(let i=1;i<raw.length;i++){
    const r=raw[i];if(!r[0]) continue;
    const ns=(r[4]||'').toString().split(',').map(s=>s.trim()).filter(Boolean);
    const es=(r[5]||'').toString().split(',').map(s=>s.trim()).filter(Boolean);
    checks.push({
      rowIndex: i+1,  // מספר שורה אמיתי בגיליון (מתחיל מ-2)
      date:pd(r[0]),
      building:(r[1]||'').toString(),
      floor:(r[2]||'').toString(),
      domain:(r[3]||'').toString(),
      crew:ns.map((n,idx)=>({name:n,email:es[idx]||''}))
    });
  }
}

function parseStaff(raw){
  staff=[];blds=[];bldFloors={};
  const bs=new Set();
  for(let i=1;i<raw.length;i++){
    const r=raw[i];
    const b=(r[0]||'').toString().trim();
    const fl=(r[1]||'').toString().trim();
    const d=(r[3]||'').toString().trim();
    const n=(r[4]||'').toString().trim();
    const e=(r[5]||'').toString().trim();
    if(b){
      bs.add(b);
      if(fl&&fl!=='קרקע'){
        if(!bldFloors[b]) bldFloors[b]=new Set();
        bldFloors[b].add(fl);
      }
    }
    if(!n||!e) continue;
    if(staff.find(x=>x.name===n&&x.email===e)) continue;
    staff.push({name:n,email:e,domain:d,building:b});
  }
  blds=[...bs].sort();
  const fb=document.getElementById('fBuild');
  if(fb&&blds.length) fb.innerHTML=blds.map(b=>`<option>${b}</option>`).join('');
  console.log('=== עובדים ===');
  staff.forEach(s=>console.log(s.name+' | '+s.domain+' | '+s.email));
  console.log('סה"כ: '+staff.length);
}

function pd(v){
  if(!v) return null;
  if(v instanceof Date) return v;
  if(typeof v==='string'){const p=v.split('/');if(p.length===3)return p[2].length===4?new Date(p[2],p[1]-1,p[0]):new Date(p[0],p[1]-1,p[2]);return new Date(v);}
  return new Date(v);
}

function updateFloors(building){
  const sel=document.getElementById('fFloor');
  const floors=bldFloors[building];
  if(floors&&floors.size>0){
    const sorted=[...floors].map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
    if(sorted.length>0){
      sel.innerHTML=sorted.map(f=>`<option value="${f}">קומה ${f}</option>`).join('');
      return;
    }
  }
  sel.innerHTML=[1,2,3,4,5,6,7,8,9].map(f=>`<option value="${f}">קומה ${f}</option>`).join('');
}

function updateEditFloors(building, currentFloor){
  const sel=document.getElementById('efFloor');
  if(!sel) return;
  const floors=bldFloors[building];
  const list=(floors&&floors.size>0)
    ?[...floors].map(Number).filter(n=>!isNaN(n)).sort((a,b)=>a-b)
    :[1,2,3,4,5,6,7,8,9];
  sel.innerHTML=list.map(f=>`<option value="${f}"${String(f)===String(currentFloor)?' selected':''}>קומה ${f}</option>`).join('');
}

function refresh(){updateFilters();updateStats();renderCal();renderG();renderL();}

function updateFilters(){

function updateStats(){

// CALENDAR
function renderCal(){
  document.getElementById('calT').textContent=HM[M]+' '+Y;
  const fd=new Date(Y,M,1).getDay();
  const dim=new Date(Y,M+1,0).getDate();
  const today=new Date();
  const ev=new Set(checks.filter(c=>c.date&&c.date.getFullYear()===Y&&c.date.getMonth()===M).map(c=>c.date.getDate()));
  let h='';
  for(let i=0;i<fd;i++){const p=new Date(Y,M,0).getDate()-fd+i+1;h+=`<div class="cd dim">${p}</div>`;}
  for(let d=1;d<=dim;d++){
    const dt=new Date(Y,M,d);
    const t=dt.toDateString()===today.toDateString();
    const s=selD&&dt.toDateString()===selD.toDateString();
    const w=dt.getDay()===5||dt.getDay()===6;
    const c=[t&&!s?'tod':'',s?'sel':'',w?'wk':'',ev.has(d)?'ev':''].filter(Boolean).join(' ');
    h+=`<div class="cd ${c}" onclick="pickDay(${d})">${d}</div>`;
  }
  const rem=(fd+dim)%7;
  for(let d=1;d<=(rem?7-rem:0);d++) h+=`<div class="cd dim">${d}</div>`;
  document.getElementById('calDays').innerHTML=h;
}

function pickDay(d){
  selD=new Date(Y,M,d);
  weekStart=getWeekStart(selD);
  document.getElementById('fDate').value=selD.toISOString().split('T')[0];
  renderG();
}

// WEEK VIEW
let weekStart=null;

function getWeekStart(date){
  const d=new Date(date);
  d.setDate(d.getDate()-d.getDay()); // ראשון
  d.setHours(0,0,0,0);
  return d;
}

function prevW(){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()-7);renderG();}
function nextW(){weekStart=new Date(weekStart);weekStart.setDate(weekStart.getDate()+7);renderG();}

function getF(){
  const b=document.getElementById('fBld').value;
  const d=document.getElementById('fDom').value;
  return checks.filter(c=>(!b||c.building===b)&&(!d||c.domain===d));
}

function renderG(){
  if(!weekStart) weekStart=getWeekStart(new Date());
  renderCal();
  const today=new Date();
  const f=getF();

  // כותרת
  const wEnd=new Date(weekStart);wEnd.setDate(weekStart.getDate()+6);
  document.getElementById('gTitle').textContent=
    weekStart.toLocaleDateString('he-IL',{day:'numeric',month:'long'})+
    ' – '+wEnd.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});

  // בנה map לפי תאריך
  const map={};
  f.forEach(c=>{
    if(!c.date) return;
    const k=c.date.toDateString();
    if(!map[k]) map[k]=[];
    map[k].push(c);
  });

  const dayNames=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  let h='<div class="week-grid">';
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart);dt.setDate(weekStart.getDate()+i);
    const isToday=dt.toDateString()===today.toDateString();
    const isWk=dt.getDay()===5||dt.getDay()===6;
    const dayChecks=map[dt.toDateString()]||[];
    const cls='week-day'+(isToday?' today':'')+(isWk?' weekend':'');
    const dateStr=dt.toISOString().split('T')[0];

    const evHtml=dayChecks.map(c=>{
      const idx=checks.indexOf(c);
      const names=c.crew.map(p=>p.name).join(', ');
      return`<div class="wd-ev" style="background:${col(c.domain)}" onclick="event.stopPropagation();showDpop(event,${idx})">
        <div class="wd-ev-bld">בדיקה ב${c.building} | ק׳${c.floor}</div>
        <div class="wd-ev-crew">👷 ${names}</div>
      </div>`;
    }).join('');

    h+=`<div class="${cls}">
      <div class="wd-hdr">
        <div class="wd-name">${dayNames[dt.getDay()]}</div>
        <div class="wd-num">${dt.getDate()}</div>
      </div>
      <div class="wd-body">
        ${evHtml}
        <div class="wd-add" onclick="cellClickDate('${dateStr}')">＋</div>
      </div>
    </div>`;
  }
  h+='</div>';
  document.getElementById('weekCal').innerHTML=h;

  const doms=[...new Set(f.map(c=>c.domain))];
  document.getElementById('gleg').innerHTML=
    doms.map(d=>`<div class="litem"><div class="ldot" style="background:${col(d)}"></div>${d}</div>`).join('')+
    '<div class="ltip">לחץ על ＋ להוספת בדיקה • לחץ על כרטיסייה לפרטים</div>';
}

}

  Y=d.getFullYear();M=d.getMonth();selD=d;

}

  document.getElementById('dpinvbtn').onclick=()=>resendDpop();

  setTimeout(()=>document.addEventListener('click',closeDpopOut),10);

// כלי עזר – טעינה על כפתור
function setLoading(btnId, loading, originalText){
  const btn=document.getElementById(btnId);
  if(!btn) return;
  if(loading){
    btn.dataset.orig=btn.innerText.trim();
    btn.classList.add('btn-spinning');
  } else {
    btn.classList.remove('btn-spinning');
  }
}

async function deleteCheck(idx){
  const c=checks[idx];if(!c) return;
  if(!confirm(`למחוק בדיקה ב${c.building} קומה ${c.floor}?`)) return;
  closeDpop();

  if(SCRIPT_URL&&SCRIPT_URL!=='YOUR_APPS_SCRIPT_URL_HERE'&&c.rowIndex){
    try{
      setLoading('dpdelbtn',true);
      const data=JSON.stringify({rowIndex:c.rowIndex});
      console.log('מוחק שורה מספר:',c.rowIndex);
      const url=SCRIPT_URL+'?action=deleteRow&data='+encodeURIComponent(data);
      ss('loading','מוחק...');
      const r=await fetch(url);
      const j=await r.json();
      console.log('תשובת מחיקה:',j);
      setLoading('dpdelbtn',false);
      if(j.ok) toast('🗑️ הבדיקה נמחקה','warn');
      else toast('⚠️ שגיאה: '+(j.error||''),'warn');
      ss('ok','מחובר');
    }catch(e){
      setLoading('dpdelbtn',false);
      console.error('שגיאת מחיקה:',e);
      ss('err','שגיאה');
    }
  } else {
    toast('🗑️ נמחק (דוגמה)','warn');
  }
  checks.splice(idx,1);
  refresh();
}

let _editIdx=-1, editSel=[];

function openEditModal(idx){
  console.log('פותח עריכה לאינדקס', idx);
  const c=checks[idx];
  if(!c){console.error('לא נמצאה בדיקה באינדקס',idx);return;}
  _editIdx=idx;

  // מלא שדות
  document.getElementById('efDate').value=c.date?c.date.toISOString().split('T')[0]:'';
  const efB=document.getElementById('efBuild');
  if(blds.length) efB.innerHTML=blds.map(b=>`<option>${b}</option>`).join('');
  efB.value=c.building;
  updateEditFloors(c.building,c.floor);

  const doms=[...new Set(staff.map(s=>s.domain).filter(Boolean))].sort();
  const ed=document.getElementById('efDomain');
  if(doms.length) ed.innerHTML=doms.map(d=>`<option>${d}</option>`).join('');
  ed.value=c.domain;

  editSel=[...c.crew];
  renderEditSel();
  document.getElementById('eStaffSearch').value='';
  fEditStaff();

  // פתח מודל עריכה
  document.getElementById('editOverlay').classList.add('on');
  document.body.style.overflow='hidden';
  console.log('מודל עריכה נפתח');
}

function renderEditSel(){
  const el=document.getElementById('eSelStaff');
  if(!editSel.length){el.innerHTML='<div class="nostaf">טרם נבחרו</div>';return;}
  el.innerHTML=editSel.map((s,i)=>`<div class="stag">${s.name}<span class="rm" onclick="rmEditStaff(${i})">×</span></div>`).join('');
}

function fEditStaff(){
  const q=document.getElementById('eStaffSearch').value.toLowerCase();
  const dom=document.getElementById('efDomain').value;
  const list=document.getElementById('eStaffList');
  const shown=staff.filter(s=>{
    if(dom&&s.domain!==dom) return false;
    const m=!q||s.name.includes(q)||s.email.toLowerCase().includes(q);
    return m&&!editSel.find(x=>x.name===s.name&&x.email===s.email);
  });
  if(!shown.length){list.innerHTML=`<div style="padding:14px;color:var(--muted);font-size:13px;text-align:center">לא נמצאו עובדים</div>`;return;}
  list.innerHTML=shown.map(s=>`
    <div class="sopt" onclick="addEditStaff(${staff.indexOf(s)})">
      <div><div class="sname">${s.name}</div><div class="semail">${s.email}</div></div>
      <div class="sadd">+</div>
    </div>`).join('');
}

function addEditStaff(i){
  const s=staff[i];
  if(editSel.find(x=>x.name===s.name)) return;
  editSel.push({name:s.name,email:s.email});
  renderEditSel();fEditStaff();
}

function rmEditStaff(i){
  editSel.splice(i,1);renderEditSel();fEditStaff();
}

async function saveEdit(){
  const date=document.getElementById('efDate').value;
  const building=document.getElementById('efBuild').value;
  const floor=document.getElementById('efFloor').value;
  const domain=document.getElementById('efDomain').value;
  if(!date||!building||!editSel.length){toast('מלא תאריך, מבנה וצוות','warn');return;}

  const oldCheck=checks[_editIdx];
  const nameStr=editSel.map(s=>s.name).join(', ');
  const emailStr=editSel.map(s=>s.email).join(', ');

  if(SCRIPT_URL&&SCRIPT_URL!=='YOUR_APPS_SCRIPT_URL_HERE'){
    try{
      setLoading('editSaveBtn',true);
      ss('loading','שומר שינויים...');
      const data=JSON.stringify({
        rowIndex: oldCheck.rowIndex,  // מספר שורה מדויק
        date, building, floor, domain,
        name: nameStr, email: emailStr
      });
      console.log('שולח updateRow:', JSON.parse(data));
      const r=await fetch(SCRIPT_URL+'?action=updateRow&data='+encodeURIComponent(data));
      const j=await r.json();
      console.log('תשובת updateRow:', j);
      if(j.ok) toast('✅ הבדיקה עודכנה','ok');
      else toast('⚠️ שגיאה: '+(j.error||''),'warn');
      setLoading('editSaveBtn',false);
      ss('ok','מחובר');
    }catch(e){
      setLoading('editSaveBtn',false);
      console.error('שגיאת עריכה:',e);
      ss('err','שגיאה');toast('שגיאת רשת','warn');
    }
  } else {
    toast('✅ הבדיקה עודכנה (דוגמה)','ok');
  }

  checks[_editIdx]={date:new Date(date),building,floor,domain,crew:[...editSel]};
  document.getElementById('editOverlay').classList.remove('on');
  document.body.style.overflow='';
  refresh();
}

async function resendDpop(){
  if(!_dpopCheck) return;
  const c=_dpopCheck;
  const date=c.date?c.date.toISOString().split('T')[0]:'';
  const name=c.crew.map(s=>s.name).join(', ');
  const email=c.crew.map(s=>s.email).join(', ');
  try{
    ss('loading','שולח...');
    const data=JSON.stringify({date,building:c.building,floor:c.floor,domain:c.domain,name,email});
    await fetch(SCRIPT_URL+'?action=addRow&data='+encodeURIComponent(data));
    ss('ok','מחובר');toast('✅ זימון נשלח!','ok');closeDpop();
  }catch(ex){ss('err','שגיאה');toast('שגיאה','err');}
}

function closeDpop(){document.getElementById('dpopOverlay').classList.remove('on');document.removeEventListener('click',closeDpopOut);}
function closeDpopOut(e){if(e.target===document.getElementById('dpopOverlay')) closeDpop();}

// PERIOD POPUP
function showPeriod(period){
  document.getElementById('ppopOverlay').classList.add('on');
  document.body.style.overflow='hidden';
  document.querySelectorAll('.ppop-tab').forEach(t=>t.classList.remove('on'));
  const tabMap={'day':0,'week':1,'month':2};
  document.querySelectorAll('.ppop-tab')[tabMap[period]].classList.add('on');
  renderPpop(period);
}
function closePpop(){document.getElementById('ppopOverlay').classList.remove('on');document.body.style.overflow='';}
function switchPpopTab(period,el){
  document.querySelectorAll('.ppop-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');renderPpop(period);
}

function renderPpop(period){
  const now=new Date();
  let filtered=[],title='',sub='';
  if(period==='day'){
    filtered=checks.filter(c=>c.date&&c.date.toDateString()===now.toDateString());
    title='📆 בדיקות היום';
    sub=now.toLocaleDateString('he-IL',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  } else if(period==='week'){
    const start=new Date(now);start.setDate(now.getDate()-now.getDay());start.setHours(0,0,0,0);
    const end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59,999);
    filtered=checks.filter(c=>c.date&&c.date>=start&&c.date<=end);
    title='🗓️ בדיקות השבוע';
    sub=start.toLocaleDateString('he-IL',{day:'numeric',month:'long'})+' – '+end.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
  } else {
    filtered=checks.filter(c=>c.date&&c.date.getFullYear()===now.getFullYear()&&c.date.getMonth()===now.getMonth());
    title='📋 בדיקות החודש';
    sub=now.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  }
  document.getElementById('ppopTitle').textContent=title;
  document.getElementById('ppopSub').textContent=`${filtered.length} בדיקות | ${sub}`;
  const body=document.getElementById('ppopBody');
  if(!filtered.length){
    body.innerHTML=`<div class="ppop-empty"><div class="pe-icon">🔍</div><div class="pe-txt">אין בדיקות בתקופה זו</div><div class="pe-sub">לחץ ＋ להוספת בדיקה חדשה</div></div>`;
    return;
  }
  const srt=[...filtered].sort((a,b)=>a.date-b.date);
  body.innerHTML=srt.map(c=>{
    const crew=c.crew.map(p=>`<div class="pcheck-crew-tag">
      <div class="pct-av" style="background:${col(c.domain)}">${p.name.charAt(0)}</div>
      <span class="pct-name">${p.name}</span>
    </div>`).join('');
    return`<div class="pcheck-card" style="border-right-color:${col(c.domain)}">
      <div class="pcheck-top">
        <span class="pcheck-date">${c.date.toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'short'})}</span>
        <span class="pcheck-bld">${c.building}</span>
        <span class="pcheck-floor">קומה ${c.floor}</span>
        <span class="pcheck-domain" style="background:${col(c.domain)}">${c.domain}</span>
      </div>
      <div class="pcheck-crew">${crew}</div>
    </div>`;
  }).join('');
}

function cellClick(d){
  const dt=new Date(Y,M,d);
  document.getElementById('fDate').value=dt.toISOString().split('T')[0];
  openModal();
}

// LIST
let sorted=[];
function renderL(){
  sorted=[...checks].sort((a,b)=>(b.date||0)-(a.date||0));
  const tb=document.getElementById('lbody');
  if(!sorted.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:3rem;color:var(--muted)">אין בדיקות עדיין</td></tr>';return;}
  tb.innerHTML=sorted.map((c,i)=>{
    const names=c.crew.map(p=>p.name).join(', ');
    const emails=c.crew.map(p=>p.email).join(', ');
    return`<tr>
      <td>${c.date?c.date.toLocaleDateString('he-IL'):'–'}</td>
      <td><strong>${c.building}</strong></td>
      <td>${c.floor}</td>
      <td><span class="badge" style="background:${col(c.domain)}">${c.domain}</span></td>
      <td>${names}</td>
      <td style="direction:ltr;font-size:12px;color:var(--muted)">${emails}</td>
      <td><button class="inv-btn" onclick="resend(${i})">📅 זימון</button></td>
    </tr>`;
  }).join('');
}

// NAV
function prevM(){M--;if(M<0){M=11;Y--;}weekStart=getWeekStart(new Date(Y,M,1));renderG();}
function nextM(){M++;if(M>11){M=0;Y++;}weekStart=getWeekStart(new Date(Y,M,1));renderG();}
function goToday(){
  const n=new Date();Y=n.getFullYear();M=n.getMonth();selD=n;
  weekStart=getWeekStart(n);renderG();
}

// MODAL
function openModal(){
  sel=[];renderSel();
  document.getElementById('ssearch').value='';
  const doms=[...new Set(staff.map(s=>s.domain).filter(Boolean))].sort();
  const fd=document.getElementById('fDomain');
  if(doms.length) fd.innerHTML=doms.map(d=>`<option>${d}</option>`).join('');
  // עדכן קומות לפי המבנה הנוכחי
  updateFloors(document.getElementById('fBuild').value);
  renderStaff('');
  document.getElementById('moverlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('moverlay').classList.remove('on');
  document.body.style.overflow='';
}

function onDomChange(){sel=[];renderSel();document.getElementById('ssearch').value='';renderStaff('');}
function fStaff(){renderStaff(document.getElementById('ssearch').value.toLowerCase());}

function renderStaff(q){
  const l=document.getElementById('slist');
  const dom=document.getElementById('fDomain').value;
  const shown=staff.filter(s=>{
    if(dom&&s.domain!==dom) return false;
    const m=!q||s.name.includes(q)||s.email.toLowerCase().includes(q);
    return m&&!sel.find(x=>x.name===s.name&&x.email===s.email);
  });
  if(!shown.length){
    l.innerHTML=`<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">${dom?'אין עובדים בתחום '+dom:'לא נמצאו עובדים'}</div>`;
    return;
  }
  l.innerHTML=shown.map(s=>`
    <div class="sopt" onclick="addS(${staff.indexOf(s)})">
      <div><div class="sname">${s.name}</div><div class="semail">${s.email}</div></div>
      <div class="sadd">+</div>
    </div>`).join('');
}

function addS(i){
  const s=staff[i];
  if(sel.find(x=>x.name===s.name)) return;
  sel.push({name:s.name,email:s.email});
  renderSel();
  renderStaff(document.getElementById('ssearch').value.toLowerCase());
}
function rmS(i){sel.splice(i,1);renderSel();renderStaff(document.getElementById('ssearch').value.toLowerCase());}
function renderSel(){
  const el=document.getElementById('selStaff');
  if(!sel.length){el.innerHTML='<div class="nostaf">טרם נבחרו</div>';return;}
  el.innerHTML=sel.map((s,i)=>`<div class="stag">${s.name}<span class="rm" onclick="rmS(${i})">×</span></div>`).join('');
}

// SUBMIT
async function submit(){
  const date=document.getElementById('fDate').value;
  const building=document.getElementById('fBuild').value;
  const floor=document.getElementById('fFloor').value;
  const domain=document.getElementById('fDomain').value;
  if(!date||!building||!sel.length){toast('יש למלא תאריך, מבנה ולבחור צוות','warn');return;}

  const name=sel.map(s=>s.name).join(', ');
  const email=sel.map(s=>s.email).join(', ');

  const conf=checks.filter(c=>{
    if(!c.date||c.date.toDateString()!==new Date(date).toDateString()) return false;
    return c.crew.some(p=>sel.find(s=>s.name===p.name));
  });
  if(conf.length>0){
    const ns=[...new Set(conf.flatMap(c=>c.crew.map(p=>p.name)).filter(n=>sel.find(s=>s.name===n)))].join(', ');
    if(!confirm(`⚠️ ${ns} כבר משובץ/ים לבדיקה אחרת באותו יום!\nמבנה: ${conf[0].building} | ${conf[0].domain}\n\nלהמשיך בכל זאת?`)) return;
  }

  if(SCRIPT_URL&&SCRIPT_URL!=='YOUR_APPS_SCRIPT_URL_HERE'){
    try{
      ss('loading','שומר...');
      const data=JSON.stringify({date,building,floor,domain,name,email});
      const url=SCRIPT_URL+'?action=addRow&data='+encodeURIComponent(data);
      console.log('שולח:',{date,building,floor,domain,name,email});
      const r=await fetch(url);
      const j=await r.json();
      console.log('תשובה:',j);
      ss('ok','מחובר');
      if(j.ok){
        toast(j.calendarSent?'✅ נשמר ונשלח זימון ליומן!':(j.calendarError?'⚠️ נשמר, הזימון נכשל':'✅ נשמר!'),j.calendarError?'warn':'ok');
      } else {toast('שגיאה: '+(j.error||'לא ידוע'),'err');return;}
    }catch(e){ss('err','שגיאה');toast('שגיאה: '+e.message,'err');return;}
  }

  checks.push({date:new Date(date),building,floor,domain,crew:[...sel]});
  refresh();closeModal();
  document.getElementById('fFloor').value='';
}

async function resend(i){
  const c=sorted[i];if(!c||!c.crew.length) return;
  const date=c.date?c.date.toISOString().split('T')[0]:'';
  const name=c.crew.map(s=>s.name).join(', ');
  const email=c.crew.map(s=>s.email).join(', ');
  try{
    ss('loading','שולח...');
    const data=JSON.stringify({date,building:c.building,floor:c.floor,domain:c.domain,name,email});
    await fetch(SCRIPT_URL+'?action=addRow&data='+encodeURIComponent(data));
    ss('ok','מחובר');toast('✅ זימון נשלח!','ok');
  }catch(e){ss('err','שגיאה');toast('שגיאה בשליחה','err');}
}

function switchTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tc'+id).classList.add('on');
  if(id==='L') renderL();
}

init();
</script>
